name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

# If the same tag is re-pushed, cancel the in-progress run so the new one
# doesn't race the old one on draft cleanup / asset upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: create ONE draft release up-front so all matrix jobs upload to it.
  # (GitHub's "get release by tag" API does not return drafts, so letting each
  #  matrix job create its own release produces duplicate drafts with split assets.)
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            // Clean up before creating: delete this tag's release (re-run safety)
            // AND any leftover draft releases from earlier builds. Published
            // (non-draft) releases are kept, so only the newest draft survives.
            const existing = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            for (const rel of existing.data) {
              if (rel.tag_name === tag || rel.draft) {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: rel.id,
                });
                console.log(`Deleted stale release ${rel.tag_name} (draft=${rel.draft})`);
              }
            }
            const body = [
              `## scLens Desktop Runner ${tag}`,
              ``,
              `本地执行引擎，配合 scLens Web 控制台使用。`,
              ``,
              `### 安装方式`,
              `- **Windows**: 下载 \`.msi\` 安装包`,
              `- **macOS (Apple Silicon)**: 下载 \`aarch64.dmg\``,
              `- **macOS (Intel)**: 下载 \`x64.dmg\``,
              ``,
              `### 使用说明`,
              `安装后启动 scLens Runner，在 Web 控制台中配对项目，即可在本地执行单细胞分析流程。`,
              ``,
              `> 应用未做代码签名：Windows 首次运行点「更多信息 → 仍要运行」；macOS 右键 App → 打开。`,
            ].join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `scLens Runner ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # Step 2: build on each platform and upload into the shared draft release.
  build-tauri:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || matrix.args == '--target x86_64-apple-darwin' && 'x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
