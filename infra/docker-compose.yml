services:
  mysql:
    image: mysql:8.4
    container_name: sclens-mysql
    environment:
      MYSQL_ROOT_PASSWORD: sclens_root
      MYSQL_DATABASE: sclens
      MYSQL_USER: sclens
      MYSQL_PASSWORD: sclens
    ports:
      - "3307:3306"
    volumes:
      - sclens_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -usclens -psclens --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sclens_mysql_data:
